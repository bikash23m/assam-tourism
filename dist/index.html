tea gardens"}],iv=[{id:1,name:"Kamakhya Temple",location:"Nilachal Hill, Guwahati",importance:"Shakti Peetha",img:"/src/images/kamakhya-temple-dispur-assam-2-attr-hero.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=600&w=900",desc:"One of the 51 Shakti Peethas, Kamakhya Temple is dedicated to Goddess Kamakhya. Perched atop Nilachal Hill, it is a major pilgrimage site and is famous for the annual Ambubachi Mela which draws thousands of devotees and tantric practitioners.",fullDesc:"Kamakhya Temple is one of the oldest of the 51 Shakti Peethas and is dedicated to the Mother Goddess Kamakhya. Located on the Nilachal Hill in western Guwahati, this temple is a major pilgrimage destination for Hindus especially Shaivas, Shaktas and Tantrics. The temple is famous for the annual Ambubachi Mela, a fertility festival that attracts lakhs of devotees from across India and abroad. The sanctum sanctorum houses a natural cleft in the rock symbolizing the yoni of the goddess, which is worshipped. The present temple was rebuilt in the 17th century after it was demolished.",built:"8th–17th Century",deity:"Goddess Kamakhya"},{id:2,name:"Umananda Temple",location:"Peacock Island, Brahmaputra River, Guwahati",importance:"River Island Shiva Temple",img:"/src/images/Umananda-temple-assam.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=600&w=900",desc:"Located on Peacock Island (Umananda Island) in the middle of the mighty Brahmaputra River, this Lord Shiva temple is one of the smallest river islands in the world. A unique boat journey leads to this divine abode of Lord Shiva.",fullDesc:"Umananda Temple is situated on Umananda Island, also known as Peacock Island, in the middle of the Brahmaputra River in Guwahati. It is dedicated to Lord Shiva. According to Hindu legend, Lord Shiva gave this island to Goddess Parvati (Uma) as a gift of love. The temple was built in 1594 by Ahom King Gadadhar Singha. It was destroyed by an earthquake in 1897 and later rebuilt. Devotees reach the island via a short ferry ride from Guwahati, making it a scenic spiritual journey.",built:"1594 AD (rebuilt)",deity:"Lord Shiva"},{id:3,name:"Navagraha Temple",location:"Chitrachal Hill, Guwahati",importance:"Nine Planetary Gods",img:"https://temple.yatradham.org/public/Product/temple/temple_oUQTLFLy_202408221229010.jpg?auto=compress&cs=tinysrgb&fit=crop&h=600&w=900",desc:"The Navagraha Temple, dedicated to the nine celestial bodies (planets), sits atop Chitrachal Hill. It is considered one of the important astrological centers of India and attracts devotees seeking blessings from the nine planetary deities.",fullDesc:'The Navagraha Temple, meaning "Nine Planets Temple", is situated on top of Chitrachal Hill in Guwahati. The temple is dedicated to the nine celestial deities of Hindu astronomy — Surya, Chandra, Mangala, Budha, Brihaspati, Shukra, Shani, Rahu, and Ketu. The nine Shivalingas in the sanctum represent these planetary gods. The temple was originally built by the Ahom King Rajeswar Singha in the 18th century. It serves as a significant astrological and spiritual center, attracting devotees who believe prayers here neutralize malefic planetary influences in their horoscopes.',built:"18th Century",deity:"Nine Celestial Bodies"},{id:4,name:"Basistha Temple",location:"South Guwahati, Assam",importance:"Ancient Sage Ashram",img:"https://res.cloudinary.com/kmadmin/image/upload/v1720523141/kiomoi/basistha_temple_7808.jpg?auto=compress&cs=tinysrgb&fit=crop&h=600&w=900",desc:"The Basistha Temple, dedicated to the sage Basistha, lies in a serene forest setting near three small streams. The tranquil atmosphere, surrounded by lush greenery, makes it a popular pilgrimage and nature retreat for visitors.",fullDesc:"The Basistha Ashram Temple is an ancient temple complex dedicated to the sage Vasishtha, one of the Saptarishis (seven great sages) of Hindu tradition. Located in South Guwahati amid dense green forest near the confluence of three sacred streams called Sandhya, Lalita and Kanta, the temple complex provides a remarkably peaceful retreat. The streams and the forest setting create a mystical ambiance. The complex includes shrines of Shiva, Parvati and Ganesh. The area is renowned for its natural beauty and spiritual energy.",built:"Ancient — Exact date unknown",deity:"Sage Vasishtha / Lord Shiva"},{id:5,name:"Hayagriva Madhava Temple",location:"Hajo, Kamrup District",importance:"Vishnu & Buddhist Confluence",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/The_steps_leading_to_Hayagriva_Madhav_temple.jpg/3840px-The_steps_leading_to_Hayagriva_Madhav_temple.jpg?auto=compress&cs=tinysrgb&fit=crop&h=600&w=900",desc:"The Hayagriva Madhava Temple in Hajo is an important pilgrimage site for Hindus and Buddhists alike. Dedicated to Lord Vishnu in his Hayagriva form, some Buddhists believe the temple enshrines relics of the Buddha.",fullDesc:"The Hayagriva Madhava Temple at Hajo is one of the most remarkable examples of religious confluence in Assam. Dedicated to Lord Vishnu in his horse-headed form (Hayagriva), this temple is revered by both Vaishnavas and Buddhists. Buddhists believe that the site also commemorates the spot where Buddha attained Nirvana or where a relic of the Buddha was kept. The hilltop temple offers panoramic views of the surrounding landscape. The temple was reconstructed by Koch King Raghudev in the 16th century. Its serene hilltop setting and rare religious significance make it uniquely fascinating.",built:"16th Century (reconstructed)",deity:"Lord Vishnu (Hayagriva)"},{id:6,name:"Sukreswar Temple",location:"Itachali Hill, Guwahati",importance:"Riverside Shiva Shrine",img:"https://www.trawell.in/admin/images/upload/470029215Guwahati_Sukreswar_Temple_Main.jpg?auto=compress&cs=tinysrgb&fit=crop&h=600&w=900",desc:"Perched on Itachali Hill along the southern bank of the Brahmaputra River, Sukreswar Temple is known for its stunning river views. The temple houses a large Shivalinga and a tortoise idol, and it attracts both pilgrims and tourists.",fullDesc:"Sukreswar Temple, perched on the Itachali Hill on the south bank of the Brahmaputra River, is dedicated to Lord Shiva. It was built by Ahom King Pramatta Singha in 1744 AD. The temple enshrines a large Shivalinga and is known for housing a tortoise (Kurma) idol, representing one of the avatars of Lord Vishnu. The views of the Brahmaputra River from the temple premises are spectacular, especially during sunrise and sunset. The temple is also noted for its annual Shivaratri celebrations which draw large numbers of devotees.",built:"1744 AD",deity:"Lord Shiva"},{id:7,name:"Mahabhairab Temple",location:"Tezpur, Assam",importance:"Tantric Power Shrine",img:"https://dynamic-media-cdn.tripadvisor.com/media/photo-o/0d/89/90/b9/photo3jpg.jpg?auto=compress&cs=tinysrgb&fit=crop&h=600&w=900",desc:"The Mahabhairab Temple in Tezpur is dedicated to a fierce form of Lord Shiva — Bhairava. It is one of the most powerful Tantric shrines in Assam, attracting devotees who seek blessings for protection and spiritual strength.",fullDesc:"The Mahabhairab Temple in Tezpur is a significant Shaivite shrine dedicated to Mahabhairav, the fierce and powerful form of Lord Shiva. Tezpur, whose ancient name was Haruppesvara and later Sonitpur, has deep mythological connections to the story of Aniruddha and Usha. The temple is considered one of the important Tantric centers in Assam. The deity here is believed to be extremely powerful and protective. Animal sacrifice was traditionally performed here during festivals, reflecting the Tantric traditions of the region. The temple draws numerous devotees from across the Brahmaputra Valley.",built:"Ancient — Exact date unknown",deity:"Mahabhairava (Lord Shiva)"},{id:8,name:"Dhekiakhowa Bornamghar",location:"Dhekiakhowa, Jorhat District",importance:"Neo-Vaishnavite Sattra",img:"https://hblimg.mmtcdn.com/content/hubble/img/jorhatdestimages/mmt/activities/m_Dhekiakhowa_Bornamghar_Jorhat_1_l_480_640.jpg?auto=compress&cs=tinysrgb&fit=crop&h=600&w=900",desc:"The Dhekiakhowa Bornamghar is one of the oldest and most sacred Vaishnavite Sattras in Assam, established by the great saint-reformer Srimanta Sankardeva in the 15th century. Its eternal flame — said to burn uninterrupted for over 500 years — is a marvel.",fullDesc:"Dhekiakhowa Bornamghar is one of the oldest and most sacred Vaishnavite prayer halls (Namghars) in Assam. Established by the great saint-reformer Srimanta Sankardeva in the 15th century, it is believed that an eternal flame in this Namghar has been burning continuously for over 500 years without any interruption. This is considered a miracle and a testimony to the devotion of its caretakers. The site is a center of the Ekasarana Dharma (Neo-Vaishnavism) movement that Sankardeva propagated. The Sattra continues to be an active religious and cultural center preserving Assamese Vaishnavite traditions.",built:"15th Century",deity:"Lord Vishnu / Krishna"},{id:9,name:"Tamreswari Temple",location:"Sadiya, Tinsukia District",importance:"Ancient Shakti Shrine",img:"https://images.pexels.com/photos/31739736/pexels-photo-31739736.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=600&w=900",desc:"The Tamreswari Temple in Sadiya is an ancient and significant Shakti shrine in upper Assam. Historically the seat of the Chutiya Kingdom, this powerful goddess temple has been a revered place of worship for centuries.",fullDesc:"Tamreswari Temple, also known as Dikkaravasini Temple, is located in Sadiya at the confluence of the Lohit, Dibang and Brahmaputra rivers — a sacred trijunction. It is one of the most ancient Shakti shrines in Assam and was historically the presiding deity of the Chutiya Kingdom. The goddess Tamreswari (meaning 'copper-hued goddess') is a form of Durga or Kali. The temple's location at the confluence of three great rivers adds to its sacred significance. Sadiya was an important historical town in upper Assam, and the temple remains a major pilgrimage site for people from the tea-growing districts.",built:"Ancient",deity:"Goddess Tamreswari (Durga)"},{id:10,name:"Sivasagar Shiva Dol",location:"Sivasagar, Assam",importance:"Tallest Shiva Temple in Asia (historic claim)",img:"https://upload.wikimedia.org/wikipedia/commons/7/79/Siva_Dol.JPG?auto=compress&cs=tinysrgb&fit=crop&h=600&w=900",desc:"The Shiva Dol in Sivasagar is one of the tallest temple towers in India, standing at about 54 meters. Built by Ahom Queen Ambika in the 18th century, this magnificent temple complex on the banks of the Sivasagar tank is an architectural masterpiece.",fullDesc:"Sivasagar Shiva Dol, also known as Sivadol, is a magnificent temple complex built in 1734 AD by Ahom Queen Ambika, wife of King Siva Singha. The main temple tower stands approximately 54 meters (about 180 feet) tall, making it one of the tallest Shiva temple towers in India. The temple complex consists of three temples — the Sivadol (dedicated to Shiva), Vishnudol (dedicated to Vishnu) and Devidol (dedicated to Devi). Located on the banks of the Joysagar Tank (the largest man-made tank in Asia at the time), the entire complex is a stunning example of Ahom architecture and royal patronage. It is one of Assam's most visited archaeological and religious monuments.",built:"1734 AD",deity:"Lord Shiva"}],cv=[{id:1,name:"Kaziranga National Park",tag:"UNESCO World Heritage",desc:"Home to two-thirds of the world's one-horned rhinoceroses, Kaziranga is a UNESCO World Heritage Site spanning over 430 sq km of forests, grasslands and wetlands.",img:"https://images.pexels.com/photos/37623729/pexels-photo-37623729.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=800&w=1200",large:!0},{id:2,name:"Majuli Island",tag:"World's Largest River Island",desc:"The world's largest freshwater river island on the Brahmaputra, home to ancient Vaishnavite Sattras and the Mishing tribe.",img:"https://images.pexels.com/photos/6872284/pexels-photo-6872284.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=600&w=900",large:!1},{id:3,name:"Haflong — Assam's Hill Station",tag:"Switzerland of the East",desc:"The only hill station of Assam, Haflong is nestled in the North Cachar Hills, offering breathtaking views, serene lakes and lush greenery.",img:"https://images.pexels.com/photos/35151732/pexels-photo-35151732.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=600&w=900",large:!1},{id:4,name:"Manas National Park",tag:"UNESCO Biosphere Reserve",desc:"A UNESCO Natural World Heritage Site, Tiger Reserve and Biosphere Reserve, Manas hosts Bengal tigers, Asian elephants, pygmy hogs and golden langurs.",img:"https://images.pexels.com/photos/34050535/pexels-photo-34050535.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=600&w=900",large:!1},{id:5,name:"Sivasagar — Ahom Kingdom",tag:"Historical Heritage City",desc:"The ancient capital of the Ahom Kingdom, Sivasagar is dotted with magnificent temples, royal tanks, and ruins of the great Ahom civilization.",img:"/src/images/Rang-Ghar-in-Sibsagar-Assam.jpg?auto=compress&cs=tinysrgb&fit=crop&h=600&w=900",large:!1},{id:6,name:"Jorhat Tea Gardens",tag:"Tea Capital of the World",desc:"Jorhat, known as the tea capital of the world, offers immersive tea garden experiences, heritage bungalows and the flavor of colonial Assam.",img:"https://images.pexels.com/photos/32262495/pexels-photo-32262495.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=600&w=900",large:!1},{id:7,name:"Pobitora Wildlife Sanctuary",tag:"Highest Rhino Density",desc:"Pobitora has the highest concentration of one-horned rhinoceroses in the world. Just 48 km from Guwahati, it is ideal for a day wildlife safari.",img:"https://images.pexels.com/photos/8057396/pexels-photo-8057396.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=600&w=900",large:!1}],jd=[{id:"bihu",label:"Bihu Festival",icon:"fa-solid fa-music",img:"https://jungleideas.wordpress.com/wp-content/uploads/2015/11/bihu.jpg?auto=compress&cs=tinysrgb&fit=crop&h=700&w=900",title:"Bihu — The Soul of Assam",desc:"Bihu is the most celebrated and cherished festival of Assam, celebrated three times a year — Rongali Bihu (spring), Kongali Bihu (autumn) and Bhogali Bihu (harvest). The Rongali Bihu in April is the most vibrant, marked by energetic folk dances, music, and community feasts.",desc2:"The Bihu dance, performed by young men and women in colorful traditional attire, is a UNESCO-recognized intangible cultural heritage of humanity. The dance is accompanied by traditional instruments like the dhol (drum), pepa (horn flute), gogona, and toka.",highlights:[{icon:"fa-solid fa-drum",text:"Traditional Dhol, Pepa & Gogona music"},{icon:"fa-solid fa-person-dress",text:"Colorful Mekhela Chador (traditional dress)"},{icon:"fa-solid fa-calendar",text:"Three Bihus — April, October & January"},{icon:"fa-solid fa-star",text:"UNESCO Intangible Cultural Heritage"}]},{id:"food",label:"Assamese Cuisine",icon:"fa-solid fa-utensils",img:"/src/images/assamese-doi-sira.jpg?auto=compress&cs=tinysrgb&fit=crop&h=700&w=900",title:"Flavors of the Brahmaputra Valley",desc:"Assamese cuisine is simple, wholesome and uniquely flavorful, with rice as the staple food. The cuisine makes extensive use of fresh ingredients, mustard oil, bamboo shoots, herbs and a wide variety of fish from the Brahmaputra.",desc2:"Iconic Assamese dishes include Masor Tenga (tangy fish curry), Khar (an alkaline dish made with raw papaya), Duck Meat Curry, Pitha (rice cakes), and the beloved Assam Tea. The cuisine reflects the biodiversity of the region and its deep connection to nature.",highlights:[{icon:"fa-solid fa-fish",text:"Masor Tenga — Iconic tangy fish curry"},{icon:"fa-solid fa-leaf",text:"Khar — Unique alkaline dish"},{icon:"fa-solid fa-mug-hot",text:"World-famous Assam Tea"},{icon:"fa-solid fa-seedling",text:"Bamboo shoot delicacies"}]},{id:"dress",label:"Traditional Dress",icon:"fa-solid fa-shirt",img:"/src/images/assamese-traditional-dress.jpg?auto=compress&cs=tinysrgb&fit=crop&h=700&w=900",title:"The Elegance of Assamese Weaving",desc:"The traditional dress of Assamese women is the Mekhela Chador — a two-piece draped garment woven with exquisite patterns in silk. Assam is famous for its Muga silk (the only natural golden silk in the world), Pat silk, and Eri silk.",desc2:"Assamese men traditionally wear the Dhoti and Gamosa — the Gamosa being a white cotton towel with red border that is the most recognizable symbol of Assamese identity and pride. The handloom industry of Assam is one of the largest in India, with unique weaving traditions in every district.",highlights:[{icon:"fa-solid fa-star",text:"Muga — World's only natural golden silk"},{icon:"fa-solid fa-gem",text:"Mekhela Chador — Traditional women's dress"},{icon:"fa-solid fa-hands",text:"Handloom weaving heritage"},{icon:"fa-solid fa-heart",text:"Gamosa — Symbol of Assamese identity"}]},{id:"wildlife",label:"Wildlife & Nature",icon:"fa-solid fa-paw",img:"/src/images/assam-rhino-image.jpg?auto=compress&cs=tinysrgb&fit=crop&h=700&w=900",title:"A Paradise for Wildlife Lovers",desc:"Assam is endowed with extraordinary biodiversity. The state has 5 national parks and 20 wildlife sanctuaries. The mighty Brahmaputra river and its wetlands create unique ecosystems supporting rare species found nowhere else on Earth.",desc2:"From the one-horned rhinoceros to the Bengal tiger, Asian elephant, golden langur, pygmy hog, Gangetic river dolphin and the hoolock gibbon — Assam's wildlife is spectacular. Kaziranga, Manas, Orang and Nameri national parks are internationally acclaimed destinations.",highlights:[{icon:"fa-solid fa-paw",text:"One-Horned Rhinoceros — Pride of Assam"},{icon:"fa-solid fa-crown",text:"Bengal Tigers in Manas & Orang"},{icon:"fa-solid fa-water",text:"Gangetic Dolphin in Brahmaputra"},{icon:"fa-solid fa-tree",text:"5 National Parks & 20 Sanctuaries"}]}],Nd=[{img:"https://images.pexels.com/photos/30288629/pexels-photo-30288629.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=400&w=560",alt:"Assam landscape"},{img:"https://images.pexels.com/photos/37623572/pexels-photo-37623572.
